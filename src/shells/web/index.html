<!DOCTYPE html>
<html lang="el">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#2c2d4e" />
    <title>Oxygen Pelatologio — Helper</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="/icons/icon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/icons/icon.png" />
  </head>
  <body>
    <header class="page-header">
      <div class="brand">
        <img class="brand-icon" src="/icons/icon.png" alt="" width="32" height="32" />
        <div class="brand-stack">
          <span class="brand-name">OXYGEN</span>
          <span class="brand-sub">PELATOLOGIO</span>
        </div>
        <span class="brand-badge">Warehouse Helper</span>
        <span class="sync-indicator" id="sync-indicator" hidden></span>
      </div>
    </header>
    <nav class="tabs" role="tablist">
      <button class="tab active" data-tab="search" role="tab">Αναζήτηση</button>
      <button class="tab" data-tab="drafts" role="tab">Ειδοποιήσεις</button>
      <button class="tab" data-tab="agent" role="tab">Βοηθός</button>
      <button class="tab" data-tab="status" role="tab">Κατάσταση</button>
      <button class="tab" data-tab="settings" role="tab">Ρυθμίσεις</button>
    </nav>
    <main>
      <section id="tab-search" class="tab-panel active"></section>
      <section id="tab-drafts" class="tab-panel"></section>
      <section id="tab-agent" class="tab-panel"></section>
      <section id="tab-status" class="tab-panel"></section>
      <section id="tab-settings" class="tab-panel"></section>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
