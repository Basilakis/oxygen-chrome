name: Build & Release Chrome Extension

# Runs on every push to main (verifies the build stays green) and publishes a
# zipped .crx-ready artifact on any v* tag (e.g. v0.1.0) as a GitHub Release.
# The web shell deploy is handled independently by Vercel's Git integration.

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Scraper regression test
        run: npm run test:scrape

      - name: Build extension
        run: npm run build

      - name: Build web shell
        run: npm run build:web

      - name: Package extension zip
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd dist
          zip -r "../oxygen-helper-${GITHUB_REF_NAME}.zip" .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: oxygen-helper-extension
          path: dist/
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: oxygen-helper-*.zip
          generate_release_notes: true
